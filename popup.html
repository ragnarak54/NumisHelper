<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
      padding: 12px 16px;
      background: #f8f4ee;
      color: #2c2c2c;
      margin: 0;
    }
    h2 {
      margin: 0 0 4px;
      font-size: 15px;
      color: #2c3e50;
    }
    p.sub {
      margin: 0 0 12px;
      font-size: 11px;
      color: #666;
    }
    .section {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }
    button {
      background: #2c3e50;
      color: #f0e6cc;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-family: Georgia, serif;
      margin-top: 4px;
    }
    button:hover { background: #8b6914; }
    .result {
      margin-top: 8px;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 4px;
      background: #e8f4e8;
      color: #2a5;
      display: none;
    }
    .result.error { background: #fce; color: #a22; }
    hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }
    .cache-info { font-size: 11px; color: #888; }
    a { color: #8b6914; }
    .fee-row {
      display: flex;
      align-items: center;
      padding: 3px 8px;
      gap: 6px;
      font-size: 12px;
      border-bottom: 1px solid #f0e8d8;
    }
    .fee-row:last-child { border-bottom: none; }
    .fee-row.override { background: #fffbe6; }
    .fee-name { flex: 1; font-family: Georgia, serif; color: #2c2c2c; }
    .fee-name.null-rate { color: #888; font-style: italic; }
    .fee-pct { width: 38px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; font-family: monospace; text-align: right; }
    .fee-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; padding: 0 2px; margin-top: 0; line-height: 1; }
    .fee-del:hover { color: #a22; background: none; }
    .fee-source { font-size: 10px; color: #aaa; }
  </style>
</head>
<body>
  <h2>🏛️ Provenance Resolver</h2>
  <p class="sub">Highlight a provenance citation on any page to see the "Find Lot" button.</p>

  <div class="section">
    <label>Confirmed Buyer's Premiums</label>
    <div style="font-size:10px;color:#888;margin-bottom:6px;">Confirmed via the ✓ House button on lot pages. Edit or remove here.</div>
    <div id="feeList" style="max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;background:#fff;padding:4px 0;"></div>
  </div>

  <hr>

  <div class="section">
    <label>Test Parser</label>
    <input type="text" id="testInput" placeholder='e.g. Gorny &amp; Mosch 257, 2018, 357' />
    <button id="testBtn">Parse</button>
    <div class="result" id="testResult"></div>
  </div>

  <hr>

  <div class="section">
    <label>Manual Cache Entry</label>
    <input type="text" id="cacheHouse" placeholder='House (e.g. Gorny &amp; Mosch)' style="margin-bottom:4px" />
    <input type="text" id="cacheSale" placeholder='Sale # (e.g. 257)' style="margin-bottom:4px" />
    <input type="text" id="cacheNbId" placeholder='NumisBids sale ID (e.g. 2718)' />
    <button id="cacheBtn">Save to Cache</button>
    <div class="result" id="cacheResult"></div>
  </div>

  <hr>

  <hr>

  <div class="cache-info">
    Cached sales: <span id="cacheCount">–</span>
    &nbsp;·&nbsp;
    <a href="#" id="clearCache">Clear all</a>
  </div>

  <script src="parser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
